recruitment_ai_system/
├── data/                           # 📁 数据存储目录（建议在 .gitignore 中忽略）
│   ├── raw/                        # 存放八爪鱼采集器导出的原始数据 (如 boss_raw.csv, zhilian_raw.csv)
│   ├── processed/                  # 存放 Pandas 清洗、规约后的高质量数据
│   └── text_features/              # 存放 NLP 预处理后的特征数据 (如 TF-IDF 矩阵, 词库)
│
├── models/                         # 📁 训练好的模型存储目录
│   ├── kmeans_model.pkl            # KMeans 聚类模型持久化文件
│   └── nn_classifier.pt/h5         # 神经网络分类模型权重文件
│
├── notebooks/                      # 📁 Jupyter Notebook 实验目录（用于前期探索）
│   ├── 01_data_cleaning.ipynb      # Pandas 数据清洗与探索性分析 (EDA)
│   ├── 02_nlp_and_clustering.ipynb # NLP 特征提取与 KMeans 实验
│   └── 03_nn_classification.ipynb  # 神经网络分类算法设计与训练
│
├── src/                            # 📁 核心后端与算法逻辑层 (对应模块 2, 4, 5)
│   ├── __init__.py
│   ├── data_pipeline/              # 对应【模块2】：数据预处理模块
│   │   ├── cleaner.py              # 数据清理、缺失值处理、数据变换逻辑
│   │   └── nlp_processor.py        # 文本分词 (如 Jieba)、去停用词、特征向量化
│   │
│   |── visualization/                # 可视化
│       |──visualization.py              # 可视化响应模块
│   │
│   ├── ml_engine/                  # 对应【模块4】：机器学习模块
│   │   ├── cluster.py              # KMeans 聚类算法封装与调用
│   │   └── classifier.py           # 神经网络模型的训练与推理封装
│   │
│   └── llm_service/                # 对应【模块5】：AI智能交互模块
│       ├── prompts.py              # 定制化求职建议的提示词模板 (Prompt Engineering)
│       └── chat_api.py             # 封装大模型 API 调用 (如 OpenAI, 智谱, 文心一言等)
│
├── app/                            # 📁 Streamlit 前端展现层 (对应模块 3, 6)
│   ├── main.py                     # Streamlit 主入口文件 (通常是系统首页/导航)
│   ├── utils/                      # 存放 UI 相关的辅助函数 (如 Session 状态管理)
│   ├── components/                 # 页面组件化 (保持代码整洁)
│   │   ├── auth.py                 # 用户登录注册组件
│   │   └── plots.py                # 封装数据可视化图表 (Echarts, Plotly 或原生 pyplot)
│   │
│   └── pages/                      # Streamlit 多页面路由目录 (自动生成侧边栏菜单)
│       ├── 01_📊_数据可视化大屏.py    # 对应【模块3】：薪资、企业分布、融资阶段分析
│       ├── 02_☁️_岗位词云与需求.py    # 对应【模块3】：词云技术提取技能、福利、学历分布
│       ├── 03_🧠_机器学习聚类分析.py  # 对应【模块4、6】：KMeans结果展示、岗位分类可视化
│       └── 04_🤖_智能求职助手.py      # 对应【模块5、6】：基于大模型的智能客服聊天界面
│
├── config/                         # 📁 配置文件目录
│   ├── config.yaml                 # 数据库配置、文件路径、模型超参数
│   └── .env.example                # 环境变量模板 (存放 LLM API Key，防泄露)
│
├── requirements.txt                # 项目依赖清单 (pandas, streamlit, scikit-learn, torch等)
├── README.md                       # 项目启动说明与介绍
└── .gitignore                      # Git 忽略文件配置